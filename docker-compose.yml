services:
  postgres:
    image: postgres:16-alpine
    container_name: whareception-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whareception
    ports:
      - '5432:5432'
    volumes:
      - whareception_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whareception-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - whareception_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  whareception_pgdata:
  whareception_redisdata:
